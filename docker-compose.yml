version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: todo-mysql
    restart: always
    environment:
      MYSQL_DATABASE: todo_app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: todo-backend
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      PORT_LOCAL: 8080
      DB_URL: jdbc:mysql://db:3306/todo_app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASSWORD: root

volumes:
  mysql_data:
